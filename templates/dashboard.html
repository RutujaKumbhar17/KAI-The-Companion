<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kai Companion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-container {
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            height: 100vh;
            overflow-y: auto;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
        }
        .stat-card h4 {
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #008069;
        }
    </style>
</head>
<body class="landing-body">
    <div class="dashboard-container">
        <div class="dashboard-header">
            <a href="{{ url_for('home') }}" class="btn-back"><i class="fas fa-arrow-left"></i> Home</a>
            <h1 class="header-text-large">Your Dashboard</h1>
            <div style="width: 80px;"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>Total Conversations</h4>
                <div class="stat-value">24</div>
            </div>
            <div class="stat-card">
                <h4>Mood Indicator</h4>
                <div class="stat-value">Mostly Happy</div>
            </div>
            <div class="stat-card">
                <h4>Diary Entries</h4>
                <div class="stat-value">12</div>
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center; color: #666;">
            <p>More detailed analytics coming soon...</p>
        </div>
    </div>
</body>
</html>
