<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kai Video Companion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>

    <div class="main-screen">
        <div class="header-panel" style="pointer-events: none;">
            <a href="{{ url_for('home') }}" class="btn-back" style="position: absolute; left: 40px; pointer-events: auto;"><i class="fas fa-arrow-left"></i> Home</a>
            <div class="header-text-large" style="pointer-events: none;">Interactive Agent</div>
        </div>

        <div id="kai-video-container" class="video-container primary-view">
            <!-- True Gen AI Integration - Bypassing sign-in using skip_home / user params -->
            <iframe 
                id="trugen-agent"
                src="https://app.trugen.ai/embed/d905a885-9b48-4fa2-8a34-46d318fbe244?embedded=true&name=Guest&email=guest%40example.com&skip_home=true&hide_login=true&anonymous=true" 
                style="width: 100%; height: 100%; border: none;"
                allow="camera; microphone; autoplay; display-capture; encrypted-media;"
            ></iframe>
            <div class="label kai-label">Kai (AI)</div>
        </div>

        <!-- User video container removed as requested -->
        
        <!-- Chat and Controls removed as requested -->

    </div>

    <script type="module" src="{{ url_for('static', filename='js/client.js') }}"></script>
</body>
</html>
