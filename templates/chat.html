<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Kai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/liquid-glass.css') }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ["'Instrument Serif'", "serif"],
                        body: ["'Barlow'", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="apple-theme bg-black h-screen flex flex-col overflow-hidden">

    <!-- Atmospheric Aura Glows -->
    <div class="chat-bg-overlay"></div>
    <div class="aura-glow aura-primary"></div>
    <div class="aura-glow aura-secondary"></div>
    <div class="aura-glow bg-blue-500 opacity-10 blur-[120px] absolute -top-40 -left-60 w-[500px] h-[500px] rounded-full"></div>
    <div class="aura-glow bg-purple-500 opacity-10 blur-[120px] absolute -bottom-40 -right-60 w-[500px] h-[500px] rounded-full"></div>

    <a href="{{ url_for('home') }}" class="back-btn liquid-glass" title="Back to Home">
        <i class="fas fa-arrow-left"></i>
    </a>

    <header class="fixed top-0 left-0 w-full z-10 px-6 py-4 border-b border-white/5 bg-black/50 backdrop-blur-xl">
        <div class="max-w-4xl mx-auto flex items-center justify-center">
            <h1 class="text-2xl italic">Chat with Kai</h1>
        </div>
    </header>

    <main id="chat-messages" class="flex-1 overflow-y-auto px-6 pt-28 pb-32 flex flex-col max-w-4xl mx-auto w-full chat-messages">
        <div class="flex flex-col gap-1 mb-6 items-start">
            <div class="bot-msg liquid-glass">
                Hello! I'm Kai, your companion. I'm here to listen and talk. What's on your mind today?
            </div>
            <!-- Initial message usually doesn't have audio, keeping as placeholder or removing -->
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full px-6 py-8 pointer-events-none">
        <div class="max-w-2xl mx-auto w-full pointer-events-auto">
            <div class="liquid-glass-strong rounded-full p-2 flex items-center gap-2 border border-white/10 shadow-2xl">
                <input type="text" id="chat-input" placeholder="Type a message..." 
                    class="flex-1 bg-transparent border-none text-white outline-none px-6 py-2 font-light text-lg">
                <button id="send-btn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:bg-white/90 transition-all">
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    <script>
        // Override the chat message creation to use our new styles
        const originalAppendMessage = window.appendMessage; // If it exists
        // Since I'm overwriting the template, I should ensure the JS uses the right classes
        // I'll check chat.js next if needed, but the structure remains the same.
    </script>
</body>
</html>
