<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Kai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            background: #1a1a1a;
        }
        .chat-header {
            padding: 20px 40px;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .chat-messages {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chat-input-wrapper {
            padding: 30px 40px;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
        }
        .chat-input-box {
            max-width: 800px;
            width: 100%;
            display: flex;
            gap: 15px;
            background: #2a2a2a;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chat-input-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }
        .btn-back {
            color: #ccc;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s;
        }
        .btn-back:hover { color: #fff; }
        
        /* Message styles are inherited from style.css but I'll add some overrides for the full page */
        .message {
            font-size: 1.1rem;
            padding: 15px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body class="landing-body">
    <div class="chat-container">
        <div class="chat-header">
            <a href="{{ url_for('home') }}" class="btn-back"><i class="fas fa-arrow-left"></i> Home</a>
            <div class="header-text-large">Chat with Kai</div>
            <div style="width: 80px;"></div> <!-- Spacer -->
        </div>

        <div id="chat-messages" class="chat-messages">
            <div class="message bot-msg">Hello! I'm here to listen. What's on your mind today?</div>
        </div>

        <div class="chat-input-wrapper">
            <div class="chat-input-box">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button id="send-btn" class="icon-btn" style="color: #008069;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
